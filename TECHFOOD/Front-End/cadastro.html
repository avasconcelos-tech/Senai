<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="src/styles/global.css" />
    <link rel="stylesheet" href="src/styles/style.css" />
    <link rel="stylesheet" href="src/styles/cadastro.css" />
    <title>TechFood - Cadastrar Prato</title>
  </head>
  <body>

    <header id="topo-loja">
      <h1 id="titulo-site">TechFood - Sabor & Saber</h1>
      <p>Painel Administrativo de Produtos</p>

      <nav id="menu">
        <ul>
          <li><a href="index.html">Voltar ao Cardápio</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <section>
        <h2 class="titulo-secao">Cadastrar Novo Prato</h2>
        
        <div class="container-form">
          <form id="form-cadastro" enctype="multipart/form-data">
            
            <div class="form-group">
              <label for="nome">Nome do Prato:</label>
              <input type="text" id="nome" required placeholder="Ex: Pizza Calabresa" />
            </div>

            <div class="form-group">
              <label for="descricao">Descrição / Ingredientes:</label>
              <textarea id="descricao" required placeholder="Ex: Molho de tomate, queijo, calabresa fatiada e cebola."></textarea>
            </div>

            <div class="form-group">
              <label for="preco">Preço (R$):</label>
              <input type="number" id="preco" step="0.01" min="0.01" required placeholder="0.00" />
            </div>

            <div class="form-group">
              <label for="categoria">Categoria:</label>
              <select id="categoria" required>
                <option value="">Selecione uma opção...</option>
                <option value="Prato Principal">Prato Principal</option>
                <option value="Bebida">Bebida</option>
                <option value="Sobremesa">Sobremesa</option>
                <option value="Entrada">Entrada</option>
              </select>
            </div>

            <div class="form-group">
              <label for="foto">Foto do Prato:</label>
              <input type="file" id="foto" accept="image/*" required />
            </div>

            <button type="submit" class="btn-pedido">Salvar Prato no Sistema</button>
          </form>
        </div>
      </section>
    </main>

    <script src="src/scripts/cadastro.js"></script>
  </body>
</html>
